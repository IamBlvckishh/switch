<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>SWITCH</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <style>
      :root { --dim: #1a1a1a; --text: #ffffff; --active-bg: #000; --dim-ratio: 0; }
      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
      
      /* Locking the viewport to prevent scrolling */
      html, body { 
        background-color: #000; 
        color: var(--text); 
        margin: 0; 
        padding: 0;
        height: 100vh; 
        width: 100vw;
        overflow: hidden; 
        font-family: "Courier New", monospace; 
        user-select: none; 
        touch-action: none; /* Prevents pull-to-refresh and bounce */
        transition: color 0.3s, background-color 0.3s; 
      }

      /* Fixed Positioning for Corners */
      .identity-corner { 
        position: absolute;
        top: 0;
        right: 0;
        padding: 30px;
        cursor: pointer; 
        z-index: 20; 
      }

      .jackpot-corner { 
        position: absolute;
        bottom: 0;
        left: 0;
        padding: 30px;
        border-left: 2px solid var(--text); 
        margin: 0 0 30px 30px;
        z-index: 20;
      }

      /* Centered Container */
      .center-content {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 100%;
      }

      .switch-wrapper { 
        /* Height-based clamping ensures it never pushes content off-screen on mobile */
        width: min(70vw, 35vh, 320px); 
        height: min(70vw, 35vh, 320px); 
        border: 10px solid var(--text); 
        border-radius: 50%; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        cursor: pointer; 
        transition: transform 0.1s; 
        z-index: 10; 
      }
      .switch-wrapper:active { transform: scale(0.95); }
      
      svg { width: 65%; height: 65%; fill: none; stroke: var(--text); stroke-width: 70; stroke-linecap: round; }

      .info { margin-top: 20px; text-align: center; }
      .status-text { 
        font-size: clamp(3.5rem, 12vw, 6rem); 
        font-weight: 900; 
        margin: 0; 
        letter-spacing: -5px; 
        line-height: 0.8; 
      }

      .jackpot-value { font-size: clamp(1.8rem, 8vw, 2.5rem); font-weight: 900; letter-spacing: -1.5px; }

      #color-layer { 
        position: fixed; 
        top: 0; left: 0; 
        width: 100%; height: 100%; 
        background-color: var(--active-bg); 
        opacity: var(--dim-ratio); 
        z-index: -1; 
        transition: opacity 0.3s ease-out; 
      }
      
      body.is-off { --text: #555; }
      body.is-rolling svg { animation: glitch 0.15s infinite; }
      @keyframes glitch { 0% { transform: translate(2px, 1px); } 50% { transform: translate(-1px, -2px); opacity: 0.7; } 100% { transform: translate(0); } }
      .void-flash { animation: void-anim 0.5s steps(2) infinite; }
      @keyframes void-anim { from { filter: invert(1); } to { filter: invert(0); } }

      /* Desktop nudge to original spacing */
      @media (min-width: 768px) {
        .identity-corner { top: 30px; right: 30px; }
        .jackpot-corner { bottom: 30px; left: 30px; margin: 0; }
        .info { margin-top: 30px; }
      }
    </style>
  </head>
  <body id="world" class="is-off">
    <div class="identity-corner" id="identity-toggle">
      <div style="text-align: right">
        <div style="font-size: 0.5rem; letter-spacing: 2px; opacity: 0.5">STATUS</div>
        <div id="wallet-status" style="font-size: 0.8rem; font-weight: 900">CONNECT</div>
      </div>
    </div>

    <div id="color-layer"></div>

    <div class="center-content">
      <div class="switch-wrapper" id="flicker">
        <svg viewBox="0 0 1000 1000">
          <path d="M500,350 L500,100" />
          <path d="M320,200 A400,400 0 1,0 680,200" />
        </svg>
      </div>
      <div class="info"><p class="status-text" id="status">OFF</p></div>
    </div>

    <div class="jackpot-corner">
      <div style="font-size: 0.5rem; opacity: 0.5; letter-spacing: 2px">POT (USDC)</div>
      <div id="jackpot-pool" class="jackpot-value">$0.00</div>
    </div>

    <script>
      const CONFIG = {
        CONTRACT: "0xFF7E62c708da36206F0F0aba7B1A26e806b446A6",
        USDC: "0x036CbD53842c5426634e7929541eC2318f3dCF7e",
        MAX_TIME: 600, 
        ABI: [
          "function flick() external",
          "function currentColor() view returns (string)",
          "function pot() view returns (uint256)",
          "function lastActor() view returns (address)",
          "function expiration() view returns (uint256)"
        ],
        USDC_ABI: [
          "function approve(address spender, uint256 amount) returns (bool)",
          "function allowance(address owner, address spender) view returns (uint256)"
        ]
      };

      let provider, signer, userAddress, isConnected = false, isBusy = false;

      async function sync() {
        if (isBusy) return;
        try {
          const readProvider = isConnected ? provider : new ethers.JsonRpcProvider("https://sepolia.base.org");
          const sw = new ethers.Contract(CONFIG.CONTRACT, CONFIG.ABI, readProvider);
          const [color, pool, actor, exp] = await Promise.all([
            sw.currentColor(), 
            sw.pot(), 
            sw.lastActor(), 
            sw.expiration()
          ]);
          document.getElementById("jackpot-pool").innerText = `$${ethers.formatUnits(pool, 6)}`;
          updateUI(actor, color, Number(exp) * 1000);
        } catch (e) { console.error("Syncing...", e); }
      }

      function updateUI(actor, color, expMs) {
        const now = Date.now();
        const statusEl = document.getElementById("status");
        const world = document.getElementById("world");

        if (color === "VOID") { 
          statusEl.innerText = "VOID"; world.classList.add("void-flash"); return; 
        }

        world.classList.remove("void-flash");
        if (now > expMs || actor === "0x0000000000000000000000000000000000000000") { 
          world.classList.add("is-off"); 
          statusEl.innerText = "OFF"; 
          document.documentElement.style.setProperty("--dim-ratio", "0");
          return; 
        }

        world.classList.remove("is-off");
        document.documentElement.style.setProperty("--active-bg", color);

        const hex = color.replace('#','');
        const r = parseInt(hex.substr(0,2),16), g = parseInt(hex.substr(2,2),16), b = parseInt(hex.substr(4,2),16);
        const br = (r * 299 + g * 587 + b * 114) / 1000;
        document.documentElement.style.setProperty("--text", br > 125 ? "#000" : "#fff");
        renderTimer(expMs);
      }

      function renderTimer(expMs) {
        const diff = expMs - Date.now();
        if (diff <= 0 || isBusy) { sync(); return; }

        const ratio = Math.max(0, (diff / 1000) / CONFIG.MAX_TIME);
        document.documentElement.style.setProperty("--dim-ratio", ratio.toFixed(4));

        const m = Math.floor(diff / 60000), s = Math.floor((diff % 60000) / 1000);
        document.getElementById("status").innerText = `${m}:${s < 10 ? "0" : ""}${s}`;
        requestAnimationFrame(() => renderTimer(expMs));
      }

      async function connect() {
        if (!window.ethereum) {
          alert("No wallet found. Please install MetaMask or another wallet.");
          return;
        }
        try {
          provider = new ethers.BrowserProvider(window.ethereum);
          const accts = await provider.send("eth_requestAccounts", []);
          userAddress = accts[0];
          signer = await provider.getSigner();
          isConnected = true;
          document.getElementById("wallet-status").innerText = "ACTIVE";
          sync();
        } catch (e) {
          console.error("Connect failed", e);
        }
      }

      document.getElementById("flicker").onclick = async () => {
        if (isBusy) return;
        if (!isConnected) { await connect(); return; }

        isBusy = true; 
        document.body.classList.add("is-rolling");
        
        try {
          const usdc = new ethers.Contract(CONFIG.USDC, CONFIG.USDC_ABI, signer);
          const sw = new ethers.Contract(CONFIG.CONTRACT, CONFIG.ABI, signer);
          
          const allowance = await usdc.allowance(userAddress, CONFIG.CONTRACT);
          if (allowance < 1000000n) {
            document.getElementById("status").innerText = "AUTH";
            const tx = await usdc.approve(CONFIG.CONTRACT, ethers.MaxUint256);
            await tx.wait();
          }

          document.getElementById("status").innerText = "FLICK";
          const flickTx = await sw.flick();
          await flickTx.wait();
          
          isBusy = false; 
          document.body.classList.remove("is-rolling"); 
          sync();
        } catch (e) {
          isBusy = false; document.body.classList.remove("is-rolling");
          document.getElementById("status").innerText = "FAIL";
          setTimeout(sync, 2000);
        }
      };

      document.getElementById("identity-toggle").onclick = connect;
      setInterval(sync, 10000);
      window.onload = sync;
    </script>
  </body>
</html>
