<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>SWITCH</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <style>
      :root { --text: #ffffff; --active-bg: #000; --dim-ratio: 0; }
      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
      
      /* Force single-page, no-scroll mobile layout */
      html, body { 
        background-color: #000; 
        color: var(--text); 
        margin: 0; 
        padding: 0;
        height: 100vh; 
        width: 100vw;
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        justify-content: space-between; 
        font-family: "Courier New", monospace; 
        overflow: hidden; 
        user-select: none; 
      }

      /* Connect Button Area */
      .identity-corner { 
        width: 100%;
        padding: 25px 30px;
        display: flex; 
        justify-content: flex-end;
        cursor: pointer; 
        z-index: 20; 
      }

      /* Responsive Central Switch */
      .switch-wrapper { 
        width: 65vw; 
        height: 65vw; 
        max-width: 320px;
        max-height: 320px;
        border: 10px solid var(--text); 
        border-radius: 50%; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        cursor: pointer; 
        transition: transform 0.1s; 
        z-index: 10; 
      }
      .switch-wrapper:active { transform: scale(0.95); }
      
      svg { width: 65%; height: 65%; fill: none; stroke: var(--text); stroke-width: 70; stroke-linecap: round; }

      .info { text-align: center; margin-top: 10px; }
      .status-text { 
        font-size: clamp(4rem, 18vw, 6rem); 
        font-weight: 900; 
        margin: 0; 
        letter-spacing: -5px; 
        line-height: 0.8; 
      }

      /* The Background Dimmer Layer */
      #color-layer { 
        position: fixed; 
        top: 0; left: 0; 
        width: 100%; height: 100%; 
        background-color: var(--active-bg); 
        opacity: var(--dim-ratio); 
        z-index: -1; 
        transition: background-color 0.3s;
      }

      /* Pot Section - Pushed to Bottom for Mobile */
      .jackpot-corner { 
        width: 100%;
        padding: 25px 30px;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        z-index: 10;
      }
      .jackpot-label { font-size: 0.5rem; opacity: 0.5; letter-spacing: 2px; }
      .jackpot-value { font-size: clamp(2rem, 10vw, 2.5rem); font-weight: 900; letter-spacing: -1.5px; }

      /* Visual States */
      body.is-off { --text: #555; }
      body.is-rolling svg { animation: glitch 0.15s infinite; }
      @keyframes glitch { 0% { transform: translate(2px, 1px); } 50% { transform: translate(-1px, -2px); opacity: 0.7; } 100% { transform: translate(0); } }
      .void-flash { animation: void-anim 0.5s steps(2) infinite; }
      @keyframes void-anim { from { filter: invert(1); } to { filter: invert(0); } }

      /* Desktop nudge if viewed on wide screens */
      @media (min-width: 768px) {
        .jackpot-corner { position: absolute; bottom: 30px; left: 30px; width: auto; border-left: 2px solid var(--text); padding-left: 15px; }
        .identity-corner { position: absolute; top: 30px; right: 30px; width: auto; }
      }
    </style>
  </head>
  <body id="world" class="is-off">
    
    <div class="identity-corner" id="identity-toggle">
      <div style="text-align: right">
        <div style="font-size: 0.5rem; letter-spacing: 2px; opacity: 0.5">STATUS</div>
        <div id="wallet-status" style="font-size: 0.8rem; font-weight: 900">CONNECT</div>
      </div>
    </div>

    <div id="color-layer"></div>

    <div class="switch-wrapper" id="flicker">
      <svg viewBox="0 0 1000 1000">
        <path d="M500,350 L500,100" />
        <path d="M320,200 A400,400 0 1,0 680,200" />
      </svg>
    </div>

    <div class="info">
      <p class="status-text" id="status">OFF</p>
    </div>

    <div class="jackpot-corner">
      <div class="jackpot-label">POT (USDC)</div>
      <div id="jackpot-pool" class="jackpot-value">$0.00</div>
    </div>

    <script>
      const CONFIG = {
        CONTRACT: "0xFF7E62c708da36206F0F0aba7B1A26e806b446A6",
        USDC: "0x036CbD53842c5426634e7929541eC2318f3dCF7e",
        MAX_TIME: 600, // 10 minutes in seconds
        ABI: ["function flick() external", "function currentColor() view returns (string)", "function pot() view returns (uint256)", "function lastActor() view returns (address)", "function expiration() view returns (uint256)"],
        USDC_ABI: ["function approve(address spender, uint256 amount) returns (bool)", "function allowance(address owner, address spender) view returns (uint256)"]
      };

      let provider, signer, userAddress, isConnected = false, isBusy = false;

      async function sync() {
        if (isBusy) return;
        try {
          const readProvider = isConnected ? provider : new ethers.JsonRpcProvider("https://sepolia.base.org");
          const sw = new ethers.Contract(CONFIG.CONTRACT, CONFIG.ABI, readProvider);
          const [color, pool, actor, exp] = await Promise.all([sw.currentColor(), sw.pot(), sw.lastActor(), sw.expiration()]);
          document.getElementById("jackpot-pool").innerText = `$${ethers.formatUnits(pool, 6)}`;
          updateUI(actor, color, Number(exp) * 1000);
        } catch (e) { console.error("Sync Error"); }
      }

      function updateUI(actor, color, expMs) {
        const now = Date.now();
        const world = document.getElementById("world");
        const statusEl = document.getElementById("status");

        if (color === "VOID") { statusEl.innerText = "VOID"; world.classList.add("void-flash"); return; }
        world.classList.remove("void-flash");

        if (now > expMs || actor === "0x0000000000000000000000000000000000000000") { 
          world.classList.add("is-off"); 
          statusEl.innerText = "OFF"; 
          document.documentElement.style.setProperty("--dim-ratio", "0");
          return; 
        }

        world.classList.remove("is-off");
        document.documentElement.style.setProperty("--active-bg", color);

        // Brightness check for text contrast
        const hex = color.replace('#','');
        const r = parseInt(hex.substr(0,2),16), g = parseInt(hex.substr(2,2),16), b = parseInt(hex.substr(4,2),16);
        const br = (r * 299 + g * 587 + b * 114) / 1000;
        document.documentElement.style.setProperty("--text", br > 125 ? "#000" : "#fff");

        renderTimer(expMs);
      }

      function renderTimer(expMs) {
        const diff = expMs - Date.now();
        if (diff <= 0 || isBusy) { sync(); return; }

        // Dimming Logic: Calculates ratio of time left vs Max (10 mins)
        const ratio = Math.max(0, (diff / 1000) / CONFIG.MAX_TIME);
        document.documentElement.style.setProperty("--dim-ratio", ratio.toFixed(4));

        const m = Math.floor(diff / 60000), s = Math.floor((diff % 60000) / 1000);
        document.getElementById("status").innerText = `${m}:${s < 10 ? "0" : ""}${s}`;
        requestAnimationFrame(() => renderTimer(expMs));
      }

      async function connect() {
        if (!window.ethereum) return alert("Install a wallet.");
        try {
          provider = new ethers.BrowserProvider(window.ethereum);
          const accts = await provider.send("eth_requestAccounts", []);
          userAddress = accts[0];
          signer = await provider.getSigner();
          isConnected = true;
          document.getElementById("wallet-status").innerText = "ACTIVE";
          sync();
        } catch (e) { console.error("Login failed"); }
      }

      document.getElementById("flicker").onclick = async () => {
        if (isBusy) return;
        if (!isConnected) return await connect();

        isBusy = true; 
        document.body.classList.add("is-rolling");
        try {
          const usdc = new ethers.Contract(CONFIG.USDC, CONFIG.USDC_ABI, signer);
          const sw = new ethers.Contract(CONFIG.CONTRACT, CONFIG.ABI, signer);
          const allowance = await usdc.allowance(userAddress, CONFIG.CONTRACT);
          
          if (allowance < 1000000n) {
            document.getElementById("status").innerText = "AUTH";
            await (await usdc.approve(CONFIG.CONTRACT, ethers.MaxUint256)).wait();
          }

          document.getElementById("status").innerText = "FLICK";
          await (await sw.flick()).wait();
          isBusy = false; document.body.classList.remove("is-rolling"); sync();
        } catch (e) {
          isBusy = false; document.body.classList.remove("is-rolling");
          document.getElementById("status").innerText = "FAIL";
          setTimeout(sync, 2000);
        }
      };

      document.getElementById("identity-toggle").onclick = connect;
      setInterval(sync, 10000);
      window.onload = sync;
    </script>
  </body>
</html>
