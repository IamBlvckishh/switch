<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>SWITCH</title>
    <script src="https://unpkg.com/@coinbase/wallet-sdk@3.7.1/dist/index.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <style>
      :root { --dim: #1a1a1a; --text: #ffffff; --active-bg: #000; }
      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
      body { background-color: #000; color: var(--text); margin: 0; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: "Courier New", monospace; overflow: hidden; user-select: none; transition: color 0.3s, background-color 0.3s; }
      .identity-corner { position: absolute; top: 30px; right: 30px; display: flex; align-items: center; gap: 12px; cursor: pointer; z-index: 20; }
      .switch-wrapper { width: 320px; height: 320px; border: 10px solid var(--text); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: transform 0.1s; z-index: 10; }
      .switch-wrapper:active { transform: scale(0.95); }
      svg { width: 65%; height: 65%; fill: none; stroke: var(--text); stroke-width: 70; stroke-linecap: round; }
      .info { margin-top: 40px; text-align: center; }
      .status-text { font-size: 6rem; font-weight: 900; margin: 0; letter-spacing: -5px; line-height: 0.8; }
      #color-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: var(--active-bg); opacity: 0; z-index: -1; transition: opacity 0.5s ease-in-out; }
      .jackpot-corner { position: absolute; bottom: 30px; left: 30px; border-left: 2px solid var(--text); padding-left: 15px; }
      .jackpot-value { font-size: 2.5rem; font-weight: 900; letter-spacing: -1.5px; }
      body.is-off { --text: #555; }
      body.is-rolling svg { animation: glitch 0.15s infinite; }
      @keyframes glitch { 0% { transform: translate(2px, 1px); } 50% { transform: translate(-1px, -2px); opacity: 0.7; } 100% { transform: translate(0); } }
      .void-flash { animation: void-anim 0.5s steps(2) infinite; }
      @keyframes void-anim { from { filter: invert(1); } to { filter: invert(0); } }
    </style>
  </head>
  <body id="world" class="is-off">
    <div class="identity-corner" id="identity-toggle">
      <div style="text-align: right">
        <div style="font-size: 0.5rem; letter-spacing: 2px; opacity: 0.5">STATUS</div>
        <div id="wallet-status" style="font-size: 0.8rem; font-weight: 900">CONNECT</div>
      </div>
    </div>
    <div id="color-layer"></div>
    <div class="switch-wrapper" id="flicker">
      <svg viewBox="0 0 1000 1000">
        <path d="M500,350 L500,100" />
        <path d="M320,200 A400,400 0 1,0 680,200" />
      </svg>
    </div>
    <div class="info"><p class="status-text" id="status">OFF</p></div>
    <div class="jackpot-corner">
      <div style="font-size: 0.5rem; opacity: 0.5; letter-spacing: 2px">POT (USDC)</div>
      <div id="jackpot-pool" class="jackpot-value">$0.00</div>
    </div>
    <script>
      const CONFIG = {
        CONTRACT: "0x01937f9eCf5ef892b98C75b0a6650890BBE132Ce",
        USDC: "0x036CbD53842c5426634e7929541eC2318f3dCF7e",
        ABI: [
          "function flick() external",
          "function currentColor() view returns (string)",
          "function pot() view returns (uint256)",
          "function lastActor() view returns (address)",
          "function expiration() view returns (uint256)",
          "event Flicked(address indexed actor, string color, uint256 expiration, uint256 pot)",
          "event VoidHit(address indexed winner, uint256 amount)"
        ],
        USDC_ABI: [
          "function approve(address spender, uint256 amount) returns (bool)",
          "function allowance(address owner, address spender) view returns (uint256)"
        ]
      };
      const coinbaseWallet = new CoinbaseWalletSDK({ appName: "SWITCH" });
      const ethereum = coinbaseWallet.makeWeb3Provider("https://sepolia.base.org", 84532);
      const provider = new ethers.BrowserProvider(ethereum);
      let userAddress, isConnected = false, isBusy = false;
      async function sync() {
        if (isBusy) return;
        try {
          const sw = new ethers.Contract(CONFIG.CONTRACT, CONFIG.ABI, provider);
          const [color, pool, actor, exp] = await Promise.all([sw.currentColor(), sw.pot(), sw.lastActor(), sw.expiration()]);
          document.getElementById("jackpot-pool").innerText = `$${ethers.formatUnits(pool, 6)}`;
          updateUI(actor, color, Number(exp) * 1000);
        } catch (e) { console.error(e); }
      }
      function updateUI(actor, color, expMs) {
        const now = Date.now(), statusEl = document.getElementById("status"), world = document.getElementById("world"), layer = document.getElementById("color-layer");
        if (color === "VOID") { statusEl.innerText = "VOID"; world.classList.add("void-flash"); return; }
        world.classList.remove("void-flash");
        if (now > expMs || actor === "0x0000000000000000000000000000000000000000") { world.classList.add("is-off"); statusEl.innerText = "OFF"; layer.style.opacity = "0"; return; }
        world.classList.remove("is-off");
        document.documentElement.style.setProperty("--active-bg", color);
        layer.style.opacity = "1";
        const hex = color.replace('#',''), r = parseInt(hex.substr(0,2),16), g = parseInt(hex.substr(2,2),16), b = parseInt(hex.substr(4,2),16);
        const br = (r * 299 + g * 587 + b * 114) / 1000;
        document.documentElement.style.setProperty("--text", br > 125 ? "#000" : "#fff");
        renderTimer(expMs);
      }
      function renderTimer(expMs) {
        const diff = expMs - Date.now();
        if (diff <= 0 || isBusy) { sync(); return; }
        const m = Math.floor(diff / 60000), s = Math.floor((diff % 60000) / 1000);
        document.getElementById("status").innerText = `${m}:${s < 10 ? "0" : ""}${s}`;
        requestAnimationFrame(() => renderTimer(expMs));
      }
      document.getElementById("flicker").onclick = async () => {
        if (isBusy) return;
        if (!isConnected) {
          const accts = await ethereum.request({ method: "eth_requestAccounts" });
          userAddress = accts[0]; isConnected = true;
          document.getElementById("wallet-status").innerText = "ACTIVE";
          sync(); return;
        }
        isBusy = true; document.body.classList.add("is-rolling");
        try {
          const signer = await provider.getSigner();
          const usdc = new ethers.Contract(CONFIG.USDC, CONFIG.USDC_ABI, signer);
          const sw = new ethers.Contract(CONFIG.CONTRACT, CONFIG.ABI, signer);
          const allowance = await usdc.allowance(userAddress, CONFIG.CONTRACT);
          if (allowance < 1000000n) {
            document.getElementById("status").innerText = "AUTH";
            await (await usdc.approve(CONFIG.CONTRACT, ethers.MaxUint256)).wait();
          }
          document.getElementById("status").innerText = "FLICK";
          const tx = await sw.flick(); await tx.wait();
          isBusy = false; document.body.classList.remove("is-rolling"); sync();
        } catch (e) {
          isBusy = false; document.body.classList.remove("is-rolling");
          document.getElementById("status").innerText = "FAIL"; setTimeout(sync, 2000);
        }
      };
      setInterval(sync, 10000); window.onload = sync;
    </script>
  </body>
</html>
